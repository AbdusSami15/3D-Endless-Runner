<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Maze Runner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="./style.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>
  <div id="hud">
    <div class="hudRow">
      <div class="badge"><span class="k">Score</span><span id="score" class="v">0</span></div>
      <div class="badge"><span class="k">Coins</span><span id="coins" class="v">0</span></div>
      <div class="badge"><span class="k">Best</span><span id="best" class="v">0</span></div>
    </div>
    <div class="hint">A/D or ←/→ to move • Space/↑ to jump</div>
  </div>

  <div id="mobileControls">
    <button class="mBtn" id="leftBtn">◀</button>
    <button class="mBtn" id="jumpBtn">▲</button>
    <button class="mBtn" id="rightBtn">▶</button>
  </div>

  <div id="gameOver" class="hidden">
    <div class="panel">
      <div class="title">Game Over</div>
      <div class="subtitle">Score: <span id="finalScore">0</span></div>
      <div class="subtitle2">Best: <span id="finalBest">0</span></div>
      <button id="restartBtn">Restart</button>
    </div>
  </div>

  <div id="screenFx"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
