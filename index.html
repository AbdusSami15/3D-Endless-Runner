<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>3D Endless Runner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />

  <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>

<body>
  <div id="loadingOverlay" class="loading-overlay hidden" aria-live="polite">
    <div class="loading-card">
      <div class="spinner" aria-hidden="true"></div>
      <div class="loading-title">Loading assets…</div>
      <div class="loading-subtitle">Preparing the run</div>
    </div>
  </div>

  <div id="startScreen" class="screen-overlay">
    <div class="hero">
      <div class="tagline">Dash. Dodge. Escape.</div>
      <h1>3D Endless Runner</h1>
      <p>Ride the rails. Grab the gold. Don't get busted.</p>
      <button id="startBtn" class="primary-btn">Play Now</button>
    </div>
  </div>

  <div id="countdown" class="hidden">3</div>

  <div id="hud" class="hidden">
    <div class="hud-group">
      <div class="badge">
        <span class="label">Score</span>
        <span id="score" class="value">0</span>
      </div>
      <div class="badge">
        <span class="label">Gold</span>
        <span id="coins" class="value">0</span>
      </div>
      <div class="badge">
        <span class="label">Best</span>
        <span id="best" class="value">0</span>
      </div>
    </div>

    <div class="hud-actions">
      <button id="muteBtn" class="icon-btn" type="button" aria-label="Mute Audio">MUTE</button>
      <button id="pauseBtn" class="icon-btn" type="button" aria-label="Pause Game">PAUSE</button>
    </div>
  </div>

  <div id="pauseOverlay" class="hidden screen-overlay">
    <div class="panel">
      <h2>Paused</h2>
      <button id="resumeBtn" class="primary-btn">Resume</button>
    </div>
  </div>

  <div id="gameOver" class="hidden screen-overlay">
    <div class="panel">
      <h2>Busted!</h2>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-label">Final Score</div>
          <div id="finalScore" class="stat-value">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Top Run</div>
          <div id="finalBest" class="stat-value">0</div>
        </div>
      </div>
      <button id="restartBtn" class="primary-btn">Try Again</button>
    </div>
  </div>

  <div id="screenFx"></div>
  <div id="fxFlash"></div>

  <script type="module" src="./main.js"></script>
</body>

</html>
